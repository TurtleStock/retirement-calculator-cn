<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>退休计算器 · 乌龟财富</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a0f1e;
    --navy-mid: #111827;
    --navy-light: #1a2540;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: rgba(201,168,76,0.15);
    --text: #e8e4d9;
    --text-dim: #8a8070;
    --red: #e05555;
    --green: #4caf82;
    --border: rgba(201,168,76,0.2);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.03) 0%, transparent 60%);
    pointer-events: none;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }
  header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeDown 0.8s ease both;
  }
  .brand {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(24px, 5vw, 36px);
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 12px;
  }
  h1 span {
    color: var(--gold);
  }
  .subtitle {
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .section {
    margin-bottom: 40px;
    animation: fadeUp 0.6s ease both;
  }
  .section:nth-child(2) { animation-delay: 0.1s; }
  .section:nth-child(3) { animation-delay: 0.2s; }
  .section:nth-child(4) { animation-delay: 0.3s; }
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .input-group {
    margin-bottom: 20px;
  }
  .input-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .input-label span {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
  }
  .input-hint {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
  }
  .input-row {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--navy-light);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .input-row:focus-within {
    border-color: var(--gold);
  }
  .input-prefix {
    padding: 0 14px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--gold);
    background: rgba(201,168,76,0.08);
    height: 48px;
    display: flex;
    align-items: center;
    border-right: 1px solid var(--border);
    white-space: nowrap;
  }
  input[type="number"], input[type="range"] {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    padding: 0 16px;
    height: 48px;
    width: 100%;
  }
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--navy-light);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 16px;
    transition: border-color 0.2s;
  }
  .slider-row:focus-within { border-color: var(--gold); }
  .slider-value {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    color: var(--gold);
    min-width: 48px;
    text-align: right;
  }
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 480px) { .two-col { grid-template-columns: 1fr; } }
  #results {
    margin-top: 48px;
    animation: fadeUp 0.5s ease both;
  }
  .result-card {
    background: var(--navy-light);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--gold), transparent);
  }
  .result-card.alert::before {
    background: linear-gradient(90deg, var(--red), transparent);
  }
  .result-card.good::before {
    background: linear-gradient(90deg, var(--green), transparent);
  }
  .result-title {
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
    margin-bottom: 10px;
  }
  .result-number {
    font-family: 'DM Mono', monospace;
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 500;
    color: var(--gold-light);
    line-height: 1;
    margin-bottom: 6px;
  }
  .result-number.alert { color: var(--red); }
  .result-number.good { color: var(--green); }
  .result-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
  }
  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 480px) { .result-grid { grid-template-columns: 1fr; } }
  .gap-bar {
    margin: 24px 0 8px;
    height: 8px;
    border-radius: 4px;
    background: var(--navy);
    overflow: hidden;
    position: relative;
  }
  .gap-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    background: linear-gradient(90deg, var(--green), var(--gold));
  }
  .gap-bar-label {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }
  .monthly-breakdown {
    background: var(--navy);
    border-radius: 6px;
    padding: 16px;
    margin-top: 16px;
  }
